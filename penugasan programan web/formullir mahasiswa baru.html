<body><h1>pendaftaran mahasiswa baru</h1>

        <input type="text" placeholder="email Aktif">
        <br>

        <input type="password" name="" id="">
        <br>

        <input type="radio" name="jk"> Laki-laki <br>
        <input type="radio"name="jk"> perempuan <br>
